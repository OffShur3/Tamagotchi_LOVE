[env:esp32-s3-touch-lcd-1_47]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.flash_mode = dio
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    greiman/SdFat @ ^2.2.3
    bitbank2/PNGdec @ ^1.0.2

build_flags =
    -D USER_SETUP_LOADED=1
    ; ---------- Pantalla en SPI2 (HSPI) ----------
    -D ST7789_DRIVER
    -D TFT_WIDTH=172
    -D TFT_HEIGHT=320
    -D USE_HSPI_PORT=1
    -D TFT_MISO=-1
    -D TFT_MOSI=39
    -D TFT_SCLK=38
    -D TFT_CS=21
    -D TFT_DC=45
    -D TFT_RST=40
    -D TFT_BL=46
    -D TFT_BACKLIGHT_ON=HIGH
    -D TFT_ROTATION=0
    -D TFT_RGB_ORDER=TFT_BGR
    -D TFT_INVERSION_ON
    -D SPI_FREQUENCY=40000000
    -D TOUCH_CS=-1
